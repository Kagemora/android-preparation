<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>android-prep — вопросы к собеседованию</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="titlebar">
    <div class="tl-dots">
      <span class="tl-dot red"></span>
      <span class="tl-dot yellow"></span>
      <span class="tl-dot green"></span>
    </div>
    <div class="tl-path tl-path-clickable" id="logoHome"><b>android-prep</b> — <span class="green">~/interview-notes</span></div>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">PROJECT</div>
      <div id="sidebarList"></div>
      <div class="sidebar-section-label">СПРАВОЧНЫЕ МАТЕРИАЛЫ</div>
      <div id="sidebarRefList"></div>
    </aside>

    <main class="main">
      <div class="tabbar">
        <span class="tab-dot" id="tabDot"></span>
        <span class="tab-label" id="tabLabel">welcome</span>
      </div>

      <div class="main-scroll" id="mainScroll">
        <div class="content-inner">

          <div id="dashboard"></div>

          <div id="categoryView" style="display:none">
            <h1 class="content-header" id="contentHeader"></h1>
            <div class="content-sub" id="contentSub"></div>

            <div class="search-bar">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="searchInput" placeholder="Поиск по вопросам…" />
            </div>

            <div id="questionList"></div>
          </div>

        </div>
      </div>
    </main>
  </div>

<script src="categories.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
